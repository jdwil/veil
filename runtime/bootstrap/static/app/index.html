<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VEIL Runtime</title>
    <style>
      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --border: #2e2e2e;
        --text: #e5e5e5;
        --dim: #737373;
        --accent: #a5b4fc;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      #app {
        display: grid;
        grid-template-columns: 220px 1fr;
        min-height: 100vh;
      }
      .sidebar {
        border-right: 1px solid var(--border);
        padding: 20px 0;
        background: var(--surface);
      }
      .logo {
        padding: 0 20px 24px;
        font-weight: 700;
      }
      .logo span {
        color: var(--accent);
      }
      nav a {
        display: block;
        padding: 10px 20px;
        color: var(--dim);
        text-decoration: none;
        font-size: 14px;
      }
      nav a:hover,
      nav a.active {
        color: var(--accent);
        background: rgba(165, 180, 252, 0.08);
      }
      main {
        padding: 28px 32px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      .sub {
        color: var(--dim);
        font-size: 13px;
        margin-bottom: 24px;
      }
      .err {
        color: #f87171;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
        margin-bottom: 28px;
      }
      .stat {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
      }
      .stat .v {
        font-size: 28px;
        font-weight: 700;
        color: var(--accent);
      }
      .stat .l {
        font-size: 11px;
        text-transform: uppercase;
        color: var(--dim);
      }
      .card {
        display: block;
        padding: 14px 16px;
        margin-bottom: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        text-decoration: none;
        color: var(--text);
        background: var(--surface);
      }
      .card:hover {
        border-color: var(--accent);
      }
      .card .name {
        font-weight: 600;
      }
      .card .meta {
        font-size: 12px;
        color: var(--dim);
        margin-top: 4px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin: 16px 0;
        flex-wrap: wrap;
        align-items: center;
      }
      input {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #0003;
        color: var(--text);
        min-width: 280px;
      }
      button {
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid var(--accent);
        background: transparent;
        color: var(--accent);
        cursor: pointer;
      }
      button:hover {
        background: rgba(165, 180, 252, 0.12);
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--dim);
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- Absolute path so ProductHost can serve from /static/dist/ -->
    <script type="module" src="/static/dist/spa.js"></script>
  </body>
</html>
